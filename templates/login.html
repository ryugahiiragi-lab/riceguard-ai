{% extends 'base.html' %}

{% block title %}Login Sistem - RiceGuard AI{% endblock %}

{% block content %}
<div class="bg-white p-8 rounded-xl shadow-sm border border-slate-200 w-full max-w-md mx-auto mt-10">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-slate-800">Login Sistem</h2>
        <p class="text-slate-500 text-sm mt-1">Silakan masuk menggunakan akun Pengawas</p>
    </div>

    <form action="/login" method="post" class="space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="username" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="password" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">
            Masuk
        </button>
    </form>
</div>
{% endblock %}
